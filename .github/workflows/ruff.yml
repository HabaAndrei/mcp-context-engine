# Run `ruff check` on every PR (against any branch) so lint regressions are
# caught before merge instead of being discovered locally. A non-zero exit
# from `uv run ruff check` fails this check and blocks merge.

name: Ruff

# Forces every JS-based action in this workflow to run on Node 24.
# Node 20 is deprecated on GitHub-hosted runners and will be removed
# 2026-09-16 — opt in now to silence the warning and avoid breakage.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  # Re-run on every push to the PR so a developer who fixes a lint finding
  # and pushes immediately gets a green check. No `branches:` filter — this
  # runs for PRs targeting ANY branch.
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout the PR head — we want the literal head commit's source files
      # and pyproject.toml, not the merge ref.
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install

      # Sync dependencies from uv.lock so `uv run` resolves ruff from the
      # project's pinned environment instead of downloading ad-hoc.
      - name: Install dependencies
        run: uv sync --frozen

      # `uv run ruff check` exits non-zero when any lint error is found,
      # which fails the workflow and the PR check.
      - name: Run ruff
        run: uv run ruff check
